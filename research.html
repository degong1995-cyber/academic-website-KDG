<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academic Research Studio | Research</title>
    <meta
      name="description"
      content="Research agenda, themes, and long-form project overview for an academic website."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="index.html">
          <span class="brand-kicker" id="brand-kicker">Research Studio</span>
        </a>
        <nav class="site-nav" id="site-nav" aria-label="Primary navigation"></nav>
      </header>

      <main>
        <section class="page-hero">
          <p class="eyebrow" id="page-eyebrow"></p>
          <h1 class="page-title" id="page-title"></h1>
          <p class="page-summary" id="page-summary"></p>
        </section>

        <section class="section">
          <div class="feature-grid" id="research-page-grid"></div>
        </section>

        <section class="section">
          <div class="section-heading">
            <div>
              <p class="section-kicker">Trajectory</p>
              <h2 class="section-title">How the research agenda evolves over time</h2>
            </div>
          </div>
          <div class="timeline-list" id="timeline-list"></div>
        </section>
      </main>
    </div>

    <footer class="site-footer">
      <p id="footer-text"></p>
    </footer>

    <script src="content/site-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
